# Stack Configuration
# Run /sync-stack to auto-detect and populate

name: "claude-dev-framework"
version: "1.0.0"
description: "Shared .claude/ framework for all projects"

# Tech Stack
stack:
  framework: ""           # React, Next.js, Vue, Astro, etc.
  framework_version: ""
  language: "JavaScript"  # Hooks are .cjs
  styling: ""             # Tailwind, CSS Modules, etc.
  testing: ""             # Vitest, Jest, Playwright, etc.
  package_manager: "npm"

# Active Specs
# Listed specs are loaded by /start-task before coding
# /sync-stack populates this based on your stack
specs:
  coding: []
    # - typescript-specs
    # - react-specs
  architecture: []
    # - project-structure  # Created by /init-project or /sync-stack
  config:
    - version-control
    - deployment
    - environment
    - testing
  # Claude Code internals - specs about Claude Code itself
  claude-code:
    - tools          # All available tools and their parameters
    - hooks          # Hook schemas, exit codes, matchers
    - skills         # Skill frontmatter, triggering behavior
    - agents         # Agent frontmatter, tool permissions
    - anti-patterns  # What doesn't work, behavioral issues

# Project Settings
project:
  import_alias: "@/"
  components_dir: "src/components"
  tests_dir: "tests"

# Quality Gates (run before commit)
quality:
  - format
  - lint
  - type_check
  # - test
  # - build
