# Stack Configuration
# Last synced: 2026-03-14
# Source of truth for specs and their enforcement patterns

name: "claude-dev-framework"
version: "1.0.0"
description: "Shared .claude/ framework for all projects"

# Tech Stack
stack:
  type: "framework"
  language: "JavaScript"
  runtime: "Node.js"
  package_manager: "npm"

# Active Specs
# Each spec has: name, file path, applies_to patterns, and optional related specs
# enforce-specs.cjs reads this to determine which spec to require before edits
# /build skill reads this to load specs into context

specs:
  claude-code:
    - name: hooks
      file: claude-code/hooks.md
      applies_to:
        - ".claude/hooks/**/*.cjs"
      description: "Hook configuration and behavior"

    - name: skills
      file: claude-code/skills.md
      applies_to:
        - ".claude/skills/**/*.md"
      related: [instruction-format]
      description: "Skill configuration and behavior"

    - name: agents
      file: claude-code/agents.md
      applies_to:
        - ".claude/agents/**/*.md"
      related: [instruction-format]
      description: "Agent configuration and behavior"

    - name: tools
      file: claude-code/tools.md
      applies_to:
        - ".claude/commands/**/*.md"
      description: "Available tools and parameters"

    - name: instruction-format
      file: claude-code/instruction-format.md
      applies_to:
        - ".claude/skills/**/*.md"
        - ".claude/agents/**/*.md"
        - ".claude/specs/**/*.md"
      description: "How to write instructions Claude follows"

    - name: spec-format
      file: claude-code/spec-format.md
      applies_to:
        - ".claude/specs/**/*.md"
        - ".claude/specs/**/*.yaml"
      description: "How to structure spec files"

    - name: anti-patterns
      file: claude-code/anti-patterns.md
      applies_to: []
      description: "Known failures and mistakes"

  architecture:
    - name: system-map
      file: architecture/system-map.yaml
      applies_to:
        - ".claude/hooks/**/*.cjs"
        - ".claude/skills/**/*.md"
        - ".claude/agents/**/*.md"
        - ".claude/commands/**/*.md"
      description: "How project components connect — dependency graph and change impact guide"

  config:
    - name: version-control
      file: config/version-control.md
      applies_to: []
      description: "Git conventions"

# Project Settings
project:
  hooks_dir: ".claude/hooks"
  commands_dir: ".claude/commands"
  skills_dir: ".claude/skills"
  agents_dir: ".claude/agents"
  specs_dir: ".claude/specs"

# Quality Gates (run before commit)
quality:
  - validate_yaml
  - validate_json
