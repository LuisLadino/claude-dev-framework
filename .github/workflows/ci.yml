# CI workflow - validates framework files
# Runs on pull requests to main

name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          echo "Validating YAML files..."
          python3 -c "
          import yaml
          import glob
          import sys

          errors = []
          for f in glob.glob('**/*.yaml', recursive=True) + glob.glob('**/*.yml', recursive=True):
              try:
                  with open(f) as file:
                      yaml.safe_load(file)
                  print(f'✓ {f}')
              except Exception as e:
                  errors.append(f'{f}: {e}')
                  print(f'✗ {f}: {e}')

          if errors:
              sys.exit(1)
          print('All YAML files valid')
          "

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          python3 -c "
          import json
          import glob
          import sys

          errors = []
          for f in glob.glob('**/*.json', recursive=True):
              try:
                  with open(f) as file:
                      json.load(file)
                  print(f'✓ {f}')
              except Exception as e:
                  errors.append(f'{f}: {e}')
                  print(f'✗ {f}: {e}')

          if errors:
              sys.exit(1)
          print('All JSON files valid')
          "

      - name: Check hook syntax
        run: |
          echo "Checking hook JavaScript syntax..."
          for f in $(find .claude/hooks -name "*.cjs" 2>/dev/null); do
            if node --check "$f" 2>&1; then
              echo "✓ $f"
            else
              echo "✗ $f"
              exit 1
            fi
          done
          echo "All hooks have valid syntax"

      - name: Verify required files exist
        run: |
          echo "Checking required framework files..."
          required_files=(
            ".claude/CLAUDE.md"
            ".claude/specs/stack-config.yaml"
            ".claude/specs/README.md"
            ".claude/hooks/README.md"
          )

          for f in "${required_files[@]}"; do
            if [ -f "$f" ]; then
              echo "✓ $f"
            else
              echo "✗ Missing: $f"
              exit 1
            fi
          done
          echo "All required files present"
